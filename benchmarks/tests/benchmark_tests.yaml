  - name: distinct_where
    category: DISTINCT_WHERE
    description: "SELECT DISTINCT age WHERE salary >= 50000.0"
    model: Person
    operation: distinct_where
    distinct_field: age
    where_field: salary
    where_op: ">="
    where_value_double: 50000.0

    aggregate_field: age
    size_profile: dataset_small

  - name: aggregate_max
    category: AGGREGATE
    description: "MAX(salary) aggregate"
    model: Person
    operation: aggregate_max
    aggregate_field: salary
    size_profile: dataset_small

  # ============================================================================

# Storm ORM Benchmark Test Definitions
# This YAML file is converted to JSON at build time for compile-time parsing
#
# Size Profiles (defined in sizes.hpp):
#   batch_standard:     1, 10, 100, 500, 1000, 5000, 10000, 50000, 100000
#   batch_insert_edge:  248, 249, 250 (SQLite chunk boundary)
#   batch_update_edge:  198, 199, 200 (UPDATE chunk boundary)
#   dataset_standard:   100, 1000, 10000, 100000
#   dataset_small:      10000, 50000

tests:
  # ============================================================================
  # WHERE Operations (fixed size, no profile)
  # ============================================================================
  - name: where_int_comparison_gt
    category: WHERE
    description: "WHERE with integer > comparison (age > 30)"
    model: Person
    operation: where
    where_field: age
    where_op: ">"
    where_value_int: 30
    iterations: 1000
    dataset_size: 10000

  - name: where_bool_equality
    category: WHERE
    description: "WHERE with boolean equality (is_active == true)"
    model: Person
    operation: where
    where_field: is_active
    where_op: "=="
    where_value_bool: true
    iterations: 1000
    dataset_size: 10000

  - name: where_double_comparison
    category: WHERE
    description: "WHERE with double >= comparison (salary >= 50000.0)"
    model: Person
    operation: where
    where_field: salary
    where_op: ">="
    where_value_double: 50000.0
    iterations: 1000
    dataset_size: 10000

  - name: where_int_less_than
    category: WHERE
    description: "WHERE with integer < comparison (age < 25)"
    model: Person
    operation: where
    where_field: age
    where_op: "<"
    where_value_int: 25
    iterations: 1000
    dataset_size: 10000

  # ============================================================================
  # INSERT Operations (with size profiles)
  # ============================================================================
  - name: insert
    category: INSERT
    description: "INSERT operations with various batch sizes"
    model: Person
    operation: insert
    size_profile: batch_standard

  - name: insert_no_return
    category: INSERT
    description: "INSERT without RETURNING clause (no ID retrieval)"
    model: Person
    operation: insert_no_return
    size_profile: batch_standard

  - name: insert_edge
    category: INSERT_EDGE
    description: "INSERT at SQLite chunk boundary (999/4 fields = 249)"
    model: Person
    operation: insert
    size_profile: batch_insert_edge

  # ============================================================================
  # UPDATE Operations (with size profiles)
  # ============================================================================
  - name: update_pk
    category: UPDATE_PK
    description: "UPDATE by primary key with various batch sizes"
    model: Person
    operation: update_pk
    size_profile: batch_standard

  - name: update_pk_edge
    category: UPDATE_PK_EDGE
    description: "UPDATE at SQLite chunk boundary (999/5 fields = 199)"
    model: Person
    operation: update_pk
    size_profile: batch_update_edge

  # ============================================================================
  # DELETE Operations (with size profiles)
  # ============================================================================
  - name: delete_pk
    category: DELETE_PK
    description: "DELETE by primary key with various batch sizes"
    model: Person
    operation: delete_pk
    size_profile: batch_standard

  # ============================================================================
  # SELECT Operations (with size profiles)
  # ============================================================================
  - name: select
    category: SELECT
    description: "Simple SELECT all rows"
    model: Person
    operation: select
    size_profile: dataset_standard

  # ============================================================================
  # JOIN Operations (with size profiles)
  # ============================================================================
  - name: select_join
    category: SELECT_JOIN
    description: "SELECT with INNER JOIN on FK field"
    model: FKMessage
    operation: select_join
    size_profile: dataset_standard

  - name: select_where_join
    category: SELECT_WHERE_JOIN
    description: "SELECT with WHERE + JOIN (User.age > 30)"
    model: FKMessage
    operation: select_where_join
    where_field: age
    where_op: ">"
    where_value_int: 30
    size_profile: dataset_standard

  - name: select_left_join
    category: SELECT_LEFT_JOIN
    description: "SELECT with LEFT JOIN on FK field"
    model: FKMessage
    operation: select_left_join
    size_profile: dataset_standard

  - name: select_left_join_where
    category: SELECT_LEFT_JOIN_WHERE
    description: "SELECT with LEFT JOIN + WHERE (User.age > 30)"
    model: FKMessage
    operation: select_left_join_where
    where_field: age
    where_op: ">"
    where_value_int: 30
    size_profile: dataset_standard

  - name: select_right_join
    category: SELECT_RIGHT_JOIN
    description: "SELECT with RIGHT JOIN on FK field"
    model: FKMessage
    operation: select_right_join
    size_profile: dataset_standard

  - name: select_right_join_where
    category: SELECT_RIGHT_JOIN_WHERE
    description: "SELECT with RIGHT JOIN + WHERE (User.age > 30)"
    model: FKMessage
    operation: select_right_join_where
    where_field: age
    where_op: ">"
    where_value_int: 30
    size_profile: dataset_standard

  - name: select_multi_fk_join
    category: SELECT_MULTI_FK_JOIN
    description: "SELECT with multiple FK JOINs (sender + receiver)"
    model: FKMessage
    operation: select_multi_fk_join
    size_profile: dataset_standard

  # ============================================================================
  # AGGREGATE Operations (with size profiles)
  # ============================================================================
  - name: aggregate_count
    category: AGGREGATE
    description: "COUNT(*) aggregate"
    model: Person
    operation: aggregate_count

# SonarCloud Configuration for Storm ORM
sonar.organization=spiritEcosse
sonar.projectKey=spiritEcosse_storm
sonar.projectName=Storm ORM
sonar.projectVersion=1.0

# Source root must be '.' for C++ cfamily so that sonar.exclusions applies
# to all files discovered via compile_commands.json (cfamily ignores sonar.sources
# and sonar.tests — it analyzes everything in the compilation database).
sonar.sources=.

# Language
sonar.language=cpp

# C++ cfamily: use compile_commands.json (preferred over build-wrapper)
sonar.cfamily.compile-commands=build/compile_commands.json
sonar.cfamily.cache.enabled=true
sonar.cfamily.threads=4

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions — all three properties are required to exclude from issues,
# coverage metrics, AND duplication detection respectively.
# Use direct paths (no **/ prefix) for root-level directories — more reliable
# with cfamily path resolution.
sonar.exclusions=build/**,.build/**,third_party/**,tests/**,benchmarks/**,external/**,.cache/**
sonar.coverage.exclusions=build/**,.build/**,third_party/**,tests/**,benchmarks/**,external/**,.cache/**
sonar.cpd.exclusions=build/**,.build/**,third_party/**,tests/**,benchmarks/**,external/**,.cache/**

# SonarCloud Configuration for Storm ORM
sonar.organization=spiritecosse
sonar.projectKey=spiritEcosse_storm
sonar.projectName=Storm ORM
sonar.projectVersion=1.0

# Source root must be '.' for C++ cfamily so that sonar.exclusions applies
# to all files discovered via compile_commands.json (cfamily ignores sonar.sources
# and sonar.tests — it analyzes everything in the compilation database).
sonar.sources=.

# Language
sonar.language=cpp

# C++ cfamily: build-wrapper output directory (generated by CI workflow).
# build-wrapper wraps the build command and captures compilation info,
# producing bw-output/compile_commands.json with more detail than CMake alone.
sonar.cfamily.compile-commands=bw-output/compile_commands.json
sonar.cfamily.cache.enabled=true
sonar.cfamily.threads=4

# Coverage: LLVM instrumentation exported to LCOV by cmake coverage target
sonar.cfamily.llvm-cov.reportPath=build/debug/coverage/coverage-filtered.lcov

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions — all three properties are required to exclude from issues,
# coverage metrics, AND duplication detection respectively.
# Use direct paths (no **/ prefix) for root-level directories — more reliable
# with cfamily path resolution.
sonar.exclusions=build/**,.build/**,third_party/**,tests/**,benchmarks/**,external/**,.cache/**
sonar.coverage.exclusions=build/**,.build/**,third_party/**,tests/**,benchmarks/**,external/**,.cache/**
sonar.cpd.exclusions=build/**,.build/**,third_party/**,tests/**,benchmarks/**,external/**,.cache/**

# ─────────────────────────────────────────────────────────────────────
# Rule exclusions — per-file or per-directory scoping
# ─────────────────────────────────────────────────────────────────────
# SonarCloud Automatic Analysis may not respect sonar.exclusions for all
# rule categories. The per-rule issue exclusions below provide a second
# layer of defence and document WHY each suppression exists.
#
# Syntax: sonar.issue.ignore.multicriteria.<id>.ruleKey = <rule>
#         sonar.issue.ignore.multicriteria.<id>.resourceKey = <glob>

sonar.issue.ignore.multicriteria=e1,e2

# ── e1: cpp:S1659 — "Define each identifier in dedicated statement" ──
# False positive on C++26 consteval lambdas assigned with `auto x = [] consteval { ... }`
# and structured bindings / brace-init. SonarCloud misparses these as
# multi-identifier declarations.
# Scoped to: src/orm/statements/ (consteval SQL generators)
sonar.issue.ignore.multicriteria.e1.ruleKey=cpp:S1659
sonar.issue.ignore.multicriteria.e1.resourceKey=src/orm/statements/**

# ── e2: cpp:S6188 — "Replace ptr+sz with std::span" ──
# Compile-time SQL generation in ORM utilities uses ptr+size patterns
# that cannot be replaced with std::span in consteval context.
# Scoped to: src/orm/ (consteval SQL generators)
sonar.issue.ignore.multicriteria.e2.ruleKey=cpp:S6188
sonar.issue.ignore.multicriteria.e2.resourceKey=src/orm/**

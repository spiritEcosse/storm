# SonarCloud Configuration for Storm ORM
sonar.organization=spiritEcosse
sonar.projectKey=spiritEcosse_storm
sonar.projectName=Storm ORM
sonar.projectVersion=1.0

# Source code location
sonar.sources=src
sonar.tests=tests

# Language
sonar.language=cpp

# C++ specific settings
sonar.cfamily.build-wrapper-output=build/bw-output
sonar.cfamily.cache.enabled=true
sonar.cfamily.threads=4

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage (if you generate coverage reports)
# sonar.cfamily.llvm-cov.reportPath=coverage.txt
# sonar.cfamily.gcov.reportsPath=.

# Exclusions
sonar.exclusions=**/build/**,**/tests/**,**/benchmarks/**,**/.build/**,**/external/**

# Test exclusions
sonar.test.exclusions=**/tests/**

# Additional C++ settings
sonar.cfamily.compile-commands=build/compile_commands.json

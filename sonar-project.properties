# SonarCloud Configuration for Storm ORM
sonar.organization=spiritecosse
sonar.projectKey=spiritEcosse_storm
sonar.projectName=Storm ORM
sonar.projectVersion=1.0

# Source root must be '.' for C++ cfamily so that sonar.exclusions applies
# to all files discovered via compile_commands.json (cfamily ignores sonar.sources
# and sonar.tests — it analyzes everything in the compilation database).
sonar.sources=.

# Language
sonar.language=cpp

# C++ cfamily: build-wrapper output directory (generated by CI workflow).
# build-wrapper wraps the build command and captures compilation info,
# producing bw-output/compile_commands.json with more detail than CMake alone.
sonar.cfamily.compile-commands=bw-output/compile_commands.json
sonar.cfamily.cache.enabled=true
sonar.cfamily.threads=4

# Coverage: LLVM instrumentation exported to LCOV by cmake coverage target
sonar.cfamily.llvm-cov.reportPath=build/debug/coverage/coverage-filtered.lcov

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions — all three properties are required to exclude from issues,
# coverage metrics, AND duplication detection respectively.
# Use direct paths (no **/ prefix) for root-level directories — more reliable
# with cfamily path resolution.
sonar.exclusions=build/**,.build/**,third_party/**,tests/**,benchmarks/**,external/**,.cache/**
sonar.coverage.exclusions=build/**,.build/**,third_party/**,tests/**,benchmarks/**,external/**,.cache/**
sonar.cpd.exclusions=build/**,.build/**,third_party/**,tests/**,benchmarks/**,external/**,.cache/**

# ─────────────────────────────────────────────────────────────────────
# Rule exclusions — per-file or per-directory scoping
# ─────────────────────────────────────────────────────────────────────
# SonarCloud Automatic Analysis may not respect sonar.exclusions for all
# rule categories. The per-rule issue exclusions below provide a second
# layer of defence and document WHY each suppression exists.
#
# Syntax: sonar.issue.ignore.multicriteria.<id>.ruleKey = <rule>
#         sonar.issue.ignore.multicriteria.<id>.resourceKey = <glob>

sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8

# ── e1: cpp:S1659 — "Define each identifier in dedicated statement" ──
# False positive on C++26 consteval lambdas assigned with `auto x = [] consteval { ... }`
# and structured bindings / brace-init. SonarCloud misparses these as
# multi-identifier declarations.
# Scoped to: src/orm/statements/ (consteval SQL generators)
sonar.issue.ignore.multicriteria.e1.ruleKey=cpp:S1659
sonar.issue.ignore.multicriteria.e1.resourceKey=src/orm/statements/**

# ── e2: cpp:S5025 — "Replace new with smart pointer" ──
# GTest's ::testing::RegisterTest() API requires a raw `new` in the
# factory lambda. GTest owns and deletes the pointer; wrapping in
# unique_ptr would transfer ownership incorrectly.
# Scoped to: tests/ (only place RegisterTest is used)
sonar.issue.ignore.multicriteria.e2.ruleKey=cpp:S5025
sonar.issue.ignore.multicriteria.e2.resourceKey=tests/**

# ── e3: cpp:S6188 — "Replace ptr+sz with std::span" ──
# consteval functions cannot use std::span reliably (not a literal type
# in all implementations). The ptr+size pattern is intentional for
# compile-time JSON parsing.
# Scoped to: tests/test_parser.hpp (consteval JSON parser)
sonar.issue.ignore.multicriteria.e3.ruleKey=cpp:S6188
sonar.issue.ignore.multicriteria.e3.resourceKey=tests/test_parser.hpp

# ── e4: cpp:S3776 — "Reduce Cognitive Complexity" ──
# consteval JSON parsers use switch-on-key-length + if-constexpr chains
# that inflate cognitive complexity scores. Splitting would harm
# compile-time performance and readability of the parsing state machine.
# Scoped to: tests/test_parser.hpp
sonar.issue.ignore.multicriteria.e4.ruleKey=cpp:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=tests/test_parser.hpp

# ── e5: cpp:S3776 — same rule, test runners ──
# YAML test runners use constexpr-if dispatch trees that are inherently
# complex but each branch is trivial. Cannot be split without losing
# the compile-time dispatch benefit.
# Scoped to: tests/test_select_runner.h and tests/test_write_runner.h
sonar.issue.ignore.multicriteria.e5.ruleKey=cpp:S3776
sonar.issue.ignore.multicriteria.e5.resourceKey=tests/*_runner.h

# ── e6: cpp:S125 — "Remove commented out code" ──
# NOLINTBEGIN/NOLINTEND pragmas are clang-tidy suppression directives,
# not commented-out code. SonarCloud misidentifies them.
# Scoped to: all source and test files
sonar.issue.ignore.multicriteria.e6.ruleKey=cpp:S125
sonar.issue.ignore.multicriteria.e6.resourceKey=src/**

# ── e7: cpp:S125 — same rule, test files ──
# Same false positive on NOLINT pragmas in test headers.
sonar.issue.ignore.multicriteria.e7.ruleKey=cpp:S125
sonar.issue.ignore.multicriteria.e7.resourceKey=tests/**

# ── e8: cpp:S6188 — same rule, source consteval code ──
# Compile-time SQL generation in ORM utilities also uses ptr+size
# patterns that cannot be replaced with std::span in consteval context.
sonar.issue.ignore.multicriteria.e8.ruleKey=cpp:S6188
sonar.issue.ignore.multicriteria.e8.resourceKey=src/orm/**

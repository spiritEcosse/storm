name: Build storm-ci image

on:
  workflow_dispatch:
    inputs:
      clang_rev:
        description: |
          Tag to publish in addition to :latest (e.g. clang-rev-12345).
          Leave empty to publish only :latest.
        required: false
        type: string
        default: ''
  push:
    tags:
      - 'clang-rev-*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish storm-ci
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        env:
          INPUT_CLANG_REV: ${{ inputs.clang_rev }}
        run: |
          tags=("ghcr.io/spiritecosse/storm-ci:latest")
          # Tag-triggered runs: use the git tag as the rev tag.
          if [[ "${GITHUB_REF}" == refs/tags/clang-rev-* ]]; then
              tags+=("ghcr.io/spiritecosse/storm-ci:${GITHUB_REF_NAME}")
          fi
          # workflow_dispatch with non-empty input: validate (alphanumerics,
          # dot, dash, underscore only) and add as an additional tag.
          if [[ -n "${INPUT_CLANG_REV}" ]]; then
              if [[ ! "${INPUT_CLANG_REV}" =~ ^[A-Za-z0-9._-]+$ ]]; then
                  echo "Invalid clang_rev: must match [A-Za-z0-9._-]+" >&2
                  exit 1
              fi
              tags+=("ghcr.io/spiritecosse/storm-ci:${INPUT_CLANG_REV}")
          fi
          # Emit comma-joined list for docker/build-push-action.
          (IFS=,; echo "tags=${tags[*]}") >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/ci/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}

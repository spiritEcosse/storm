name: SonarCloud Analysis

on:
  push:
    branches: [develop, master, main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop, master, main]

jobs:
  sonar:
    name: Build, Test & SonarCloud
    runs-on: self-hosted

    env:
      SONAR_SCANNER_VERSION: "8.0.1.6346"
      SONAR_SCANNER_HOME: "$HOME/.sonar/sonar-scanner-8.0.1.6346-linux-x64"
      BUILD_WRAPPER_HOME: "$HOME/.sonar/build-wrapper-linux-x86"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history required for SonarCloud blame data and new-code detection
          fetch-depth: 0

      - name: Install sonar-scanner and build-wrapper
        run: |
          # sonar-scanner
          if [[ ! -f "$HOME/.sonar/sonar-scanner-${SONAR_SCANNER_VERSION}-linux-x64/bin/sonar-scanner" ]]; then
            curl --create-dirs -sSLo "$HOME/.sonar/sonar-scanner.zip" \
              "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux-x64.zip"
            unzip -o "$HOME/.sonar/sonar-scanner.zip" -d "$HOME/.sonar/"
            rm "$HOME/.sonar/sonar-scanner.zip"
          fi
          echo "$HOME/.sonar/sonar-scanner-${SONAR_SCANNER_VERSION}-linux-x64/bin" >> "$GITHUB_PATH"

          # build-wrapper
          if [[ ! -f "$HOME/.sonar/build-wrapper-linux-x86/build-wrapper-linux-x86-64" ]]; then
            curl --create-dirs -sSLo "$HOME/.sonar/build-wrapper-linux-x86.zip" \
              "https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip"
            unzip -o "$HOME/.sonar/build-wrapper-linux-x86.zip" -d "$HOME/.sonar/"
            rm "$HOME/.sonar/build-wrapper-linux-x86.zip"
          fi
          echo "$HOME/.sonar/build-wrapper-linux-x86" >> "$GITHUB_PATH"

      - name: Configure CMake (debug + coverage)
        run: cmake --preset ninja-debug

      - name: Build with build-wrapper (captures compilation for SonarCloud)
        run: |
          build-wrapper-linux-x86-64 --out-dir bw-output \
            cmake --build --preset ninja-debug

      - name: Run tests and generate coverage report
        env:
          # PostgreSQL skips gracefully if not available on the runner
          STORM_PG_CONNSTR: "host=/var/run/postgresql dbname=storm_db user=storm_db"
        run: cmake --build --preset ninja-debug-coverage --target coverage

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # PR-specific args for pull_request events
          PR_ARGS=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_ARGS=" \
              -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
              -Dsonar.pullrequest.branch=${{ github.head_ref }} \
              -Dsonar.pullrequest.base=${{ github.base_ref }} \
              -Dsonar.pullrequest.github.repository=${{ github.repository }}"
          fi

          sonar-scanner \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.cfamily.compile-commands=bw-output/compile_commands.json \
            -Dsonar.cfamily.llvm-cov.reportPath=build/debug/coverage/coverage-filtered.lcov \
            $PR_ARGS

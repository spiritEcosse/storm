name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  test:
    name: "${{ matrix.preset }} / PG ${{ matrix.postgres }}"
    runs-on: ubuntu-24.04
    container:
      # Pinned to a specific digest so develop is unaffected by storm-ci image
      # rebuilds. Bump this when publishing a new image (see docker-ci-image.yml).
      image: ghcr.io/spiritecosse/storm-ci@sha256:90e958ac1f10ebe3721906fa67dac3a67285740974b52473fe6409404ebdd431

    services:
      postgres:
        image: "postgres:${{ matrix.postgres }}"
        env:
          POSTGRES_DB: storm_db
          POSTGRES_USER: storm_db
          POSTGRES_PASSWORD: storm_db
        options: >-
          --health-cmd "pg_isready -U storm_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        include:
          # Core presets — latest PG
          - preset: ninja-debug
            build_dir: debug
            postgres: 17
          - preset: ninja-asan-ubsan
            build_dir: asan-ubsan
            postgres: 17
          - preset: ninja-tsan
            build_dir: tsan
            postgres: 17
          - preset: ninja-msan
            build_dir: msan
            postgres: 17

          # PG compat — same build, different PG service
          - preset: ninja-debug
            build_dir: debug
            postgres: 14
          - preset: ninja-debug
            build_dir: debug
            postgres: 15
          - preset: ninja-debug
            build_dir: debug
            postgres: 16

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link clang-p2996 next to source dir
        run: ln -sfn /opt/clang-p2996 "$(dirname "$GITHUB_WORKSPACE")/clang-p2996"

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: .cache/CPM
          key: cpm-${{ matrix.preset }}-${{ hashFiles('cmake/cpm.cmake', 'cmake/tests.cmake', 'cmake/bench.cmake') }}
          restore-keys: |
            cpm-${{ matrix.preset }}-
            cpm-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: ./scripts/build-with-retry.sh ${{ matrix.preset }}

      - name: Test
        env:
          STORM_PG_CONNSTR: "host=postgres port=5432 dbname=storm_db user=storm_db password=storm_db"
        run: ctest --test-dir build/${{ matrix.build_dir }} --output-on-failure --no-tests=error

      - name: Atlas integration test
        if: matrix.preset == 'ninja-debug' && matrix.postgres == 17
        run: |
          curl -sSf https://atlasgo.sh | sh
          ./scripts/test-atlas-migration.sh
